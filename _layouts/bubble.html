<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  <style>
    @font-face {
      font-family: "OnulHeugdan";
      src: url("/assets/fonts/OnulHeugdan-Regular.otf") format("opentype");
      font-weight: 400;
    }

    html {
      height: auto;
      overflow-y: auto;
    }

    body {
      font: 18px "OnulHeugdan", monospace;
      overflow-x: hidden;
      margin: 0;
      background: #fff;
    }

    #back {
      position: fixed;
      top: 1.2em;
      left: 1.5em;
      z-index: 999;
      font-size: 14px;
      color: #3366ff;
      text-decoration: none;
      font-family: "OnulHeugdan", monospace;
    }

    #back:hover {
      text-decoration: underline;
    }

    #wrapper {
      position: fixed;
      left: 50%;
      top: 50%;
    }

    .container {
      position: absolute;
    }

    .inner {
      position: absolute;
      left: -10px;
      background: {{ page.bubble_bg | default: "#fcf" }};
      color: {{ page.bubble_color | default: "#513fce" }};
      width: 20px;
      height: 22px;
      min-width: 20px;
      min-height: 22px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container:first-child .inner {
      border-top-left-radius: 10px;
      border-bottom-left-radius: 10px;
    }

    .container:last-child .inner {
      border-top-right-radius: 10px;
      border-bottom-right-radius: 10px;
    }
  </style>
</head>
<body>
  <a id="back" href="{{ '/' | relative_url }}">← 처음으로</a>
  <div id="wrapper"></div>
  <div id="text" style="display:none">{{ content | strip_html | strip }}</div>

  <script>
    let textElement;
    const letterPairs = [];
    let offset = -window.scrollY;
    let wrapper;
    let cWidth = window.innerWidth < 600 ? 22 : 20;
    let cHeight = cWidth;
    let startRadius = 200;

    window.addEventListener('load', () => {
      wrapper = document.getElementById('wrapper');
      textElement = document.getElementById('text');
      const input = textElement.textContent.replace(/\s+/g, ' ').trim();
      const split = input.split('');

      textElement.innerHTML = '';

      const maxRadius = window.innerWidth < 600 ? window.innerWidth * 0.25 : window.innerWidth * 0.35;
      startRadius = Math.min(Math.max(50, Math.sqrt(split.length) * 15), maxRadius);

      split.forEach((character, i) => {
        const container = document.createElement('div');
        container.className = 'container';
        container.style.zIndex = (split.length - i);
        wrapper.appendChild(container);

        const inner = document.createElement('span');
        inner.className = 'inner';
        inner.innerHTML = character;
        container.appendChild(inner);

        letterPairs.push([container, inner]);
      });

      window.addEventListener('resize', () => {
        cWidth = window.innerWidth < 600 ? 22 : 20;
        cHeight = cWidth;
        const maxRadius = window.innerWidth < 600 ? window.innerWidth * 0.25 : window.innerWidth * 0.35;
        startRadius = Math.min(Math.max(50, Math.sqrt(split.length) * 15), maxRadius);
        resize();
      });
      resize();

      window.addEventListener('scroll', () => {
        offset = -window.scrollY;
        update();
      });
      update();
    });

    function resize() {
      document.body.style.height = ((letterPairs.length * cWidth) + window.innerHeight + (window.innerWidth / 2) - (cWidth / 2)) + 'px';
    }

    function update() {
      let radius = startRadius;
      let angle = 0;
      let x = offset;

      letterPairs.forEach(pair => {
        const container = pair[0];
        const inner = pair[1];

        if (x < -window.innerWidth / 2 - cWidth) {
          container.style.display = 'none';
        } else if (x < cWidth / 2) {
          container.style.left = x + 'px';
          container.style.display = 'block';
          inner.style.top = `-${startRadius}px`;
          container.style.transform = 'rotate(0deg)';
        } else {
          const circumference = 2 * Math.PI * radius;
          container.style.left = '0';
          container.style.display = 'block';

          if (!angle) {
            angle = (x / circumference) * 360;
            radius -= (x / circumference) * cHeight;
          }

          inner.style.top = -radius + 'px';
          container.style.transform = `rotate(${angle}deg)`;

          angle += (cWidth / circumference) * 360;
          radius -= (cWidth / circumference) * cHeight;
        }

        x += cWidth;
      });
    }
  </script>
</body>
</html>
